<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="500" height="900" xmlns="http://www.w3.org/2000/svg">
  <style>
    .province {
      fill: #b2dfdb;
      stroke: #004d40;
      stroke-width: 2;
    }
    .label {
      font-size: 14px;
      font-family: Arial, sans-serif;
      fill: #000;
      font-weight: bold;
    }
    .title {
      font-size: 24px;
      font-family: Arial, sans-serif;
      font-weight: bold;
    }
  </style>

  <text x="120" y="40" class="title">Southern Thailand Map</text>

  <!-- Chumphon -->
  <rect x="180" y="70" width="120" height="45" rx="10" class="province"/>
  <text x="200" y="98" class="label">Chumphon</text>

  <!-- Ranong -->
  <rect x="80" y="130" width="120" height="45" rx="10" class="province"/>
  <text x="110" y="158" class="label">Ranong</text>

  <!-- Surat Thani -->
  <rect x="210" y="130" width="170" height="55" rx="10" class="province"/>
  <text x="240" y="163" class="label">Surat Thani</text>

  <!-- Phang Nga -->
  <rect x="70" y="210" width="130" height="50" rx="10" class="province"/>
  <text x="95" y="240" class="label">Phang Nga</text>

  <!-- Phuket -->
  <rect x="40" y="280" width="90" height="40" rx="10" class="province"/>
  <text x="55" y="305" class="label">Phuket</text>

  <!-- Krabi -->
  <rect x="220" y="220" width="120" height="50" rx="10" class="province"/>
  <text x="255" y="250" class="label">Krabi</text>

  <!-- Nakhon Si Thammarat -->
  <rect x="240" y="300" width="180" height="60" rx="10" class="province"/>
  <text x="255" y="335" class="label">Nakhon Si Thammarat</text>

  <!-- Trang -->
  <rect x="120" y="360" width="120" height="50" rx="10" class="province"/>
  <text x="155" y="390" class="label">Trang</text>

  <!-- Phatthalung -->
  <rect x="260" y="390" width="120" height="50" rx="10" class="province"/>
  <text x="275" y="420" class="label">Phatthalung</text>

  <!-- Satun -->
  <rect x="70" y="450" width="100" height="50" rx="10" class="province"/>
  <text x="95" y="480" class="label">Satun</text>

  <!-- Songkhla -->
  <rect x="220" y="470" width="150" height="60" rx="10" class="province"/>
  <text x="255" y="505" class="label">Songkhla</text>

  <!-- Pattani -->
  <rect x="240" y="560" width="120" height="50" rx="10" class="province"/>
  <text x="270" y="590" class="label">Pattani</text>

  <!-- Yala -->
  <rect x="180" y="640" width="110" height="55" rx="10" class="province"/>
  <text x="215" y="673" class="label">Yala</text>

  <!-- Narathiwat -->
  <rect x="310" y="650" width="140" height="55" rx="10" class="province"/>
  <text x="325" y="683" class="label">Narathiwat</text>
</svg>
